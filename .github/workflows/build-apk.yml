name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools,platforms;android-34,build-tools;34.0.0'

      - name: Create .env file
        run: |
          cat > .env << EOF
          REACT_APP_FIREBASE_API_KEY=placeholder
          REACT_APP_FIREBASE_AUTH_DOMAIN=placeholder.firebaseapp.com
          REACT_APP_FIREBASE_PROJECT_ID=placeholder
          REACT_APP_FIREBASE_STORAGE_BUCKET=placeholder.appspot.com
          REACT_APP_FIREBASE_MESSAGING_SENDER_ID=placeholder
          REACT_APP_FIREBASE_APP_ID=placeholder
          REACT_APP_APPLOVIN_SDK_KEY=placeholder
          REACT_APP_APPLOVIN_REWARDED_AD_UNIT_WEB=placeholder
          REACT_APP_APPLOVIN_REWARDED_AD_UNIT_ANDROID=placeholder
          REACT_APP_IRONSOURCE_APP_KEY=placeholder
          REACT_APP_MIN_WITHDRAWAL=1.00
          REACT_APP_ADMIN_EMAIL=admin@placeholder.com
          EOF

      - name: Install Dependencies
        run: |
          echo "=== Starting npm install ==="
          date
          npm install 2>&1 | tail -50
          echo "=== npm install completed ==="
          date

      - name: Build Web App
        run: |
          echo "=== Starting React build ==="
          date
          npm run build 2>&1 | tail -30
          echo "=== React build completed ==="
          date

      - name: Sync Capacitor
        run: |
          echo "=== Starting Capacitor sync ==="
          date
          npx cap sync android 2>&1
          echo "=== Capacitor sync completed ==="
          date

      - name: Build APK
        run: |
          echo "=== Starting Gradle build ==="
          date
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1
          echo "=== Gradle build completed ==="
          date

      - name: Verify APK exists
        run: |
          echo "=== Checking for APK ==="
          ls -la android/app/build/outputs/apk/debug/ || echo "APK directory not found"
          find android/app/build -name "*.apk" -type f || echo "No APK files found"

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
